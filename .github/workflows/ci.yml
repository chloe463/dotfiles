name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  # test-brew-install:
  #   name: brew install
  #   runs-on: macos-latest
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #     - name: Test setup scripts
  #       run: ./up brew
  test-zprezto:
    name: Install zprezto
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Test setup scripts
        run: |
          ./up zprezto
  test-dots-syms:
    name: Make symlinks
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Test setup scripts
        run: ./up stow
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type check
        run: bun typecheck
  test-claude-statusline:
    name: Test statusline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run test
        run: bun test
