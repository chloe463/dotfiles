name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      brewfile: ${{ steps.filter.outputs.brewfile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            brewfile:
              - 'Brewfile.shared'

  test-brew-install:
    needs: detect-changes
    if: needs.detect-changes.result == 'success' && needs.detect-changes.outputs.brewfile == 'true'
    name: brew install
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Test setup scripts
        run: ./up brew
  test-sheldon:
    name: Install sheldon plugins
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install sheldon
        run: brew install sheldon
      - name: Test setup scripts
        run: |
          # Unset insteadOf to allow sheldon to clone plugins via HTTPS
          # (insteadOf redirects https://github.com/ to SSH, which has no key in CI)
          git config --global --unset 'url.ssh://git@github.com/.insteadOf' || true
          ./up sheldon
  test-dots-syms:
    name: Make symlinks
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Test setup scripts
        run: ./up stow
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type check
        run: bun typecheck
  test-claude-statusline:
    name: Test statusline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run test
        run: bun test
