name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      brewfile: ${{ steps.filter.outputs.brewfile }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            brewfile:
              - 'Brewfile.shared'

  test-brew-install:
    needs: detect-changes
    if: needs.detect-changes.result == 'success' && needs.detect-changes.outputs.brewfile == 'true'
    name: brew install
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Test setup scripts
        run: ./up brew
  test-sheldon:
    name: Install sheldon plugins
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install sheldon
        run: brew install sheldon
      - name: Test setup scripts
        run: |
          # Copy plugins.toml to the expected location (stow is not run in CI)
          mkdir -p ~/.config/sheldon
          cp zsh/.config/sheldon/plugins.toml ~/.config/sheldon/plugins.toml
          # Unset insteadOf to allow sheldon to clone plugins via HTTPS
          # (insteadOf redirects https://github.com/ to SSH, which has no key in CI)
          if git config --global --get 'url.ssh://git@github.com/.insteadOf' > /dev/null 2>&1; then
            git config --global --unset 'url.ssh://git@github.com/.insteadOf'
          fi
          ./up sheldon
      - name: Verify sheldon source is valid zsh syntax
        run: sheldon source | zsh -n
  test-dots-syms:
    name: Make symlinks
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install stow
        run: brew install stow
      - name: Test setup scripts
        run: |
          # Run against a pristine HOME so stow has no conflicts with the
          # runner's pre-existing dotfiles (e.g. ~/.config/gh), and so the job
          # actually exercises symlink creation instead of short-circuiting on
          # a missing stow.
          export HOME="$RUNNER_TEMP/stow-home"
          mkdir -p "$HOME/Library/Application Support/Code/User" \
                   "$HOME/Library/Application Support/Cursor/User" \
                   "$HOME/.claude"
          ./up stow
  typecheck:
    name: TypeScript type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type check
        run: bun typecheck
  test-claude-statusline:
    name: Test statusline
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run test
        run: bun test
